services:
  traefik:
    image: traefik:v3.1
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.le.acme.tlschallenge=true"
      - "--certificatesresolvers.le.acme.email=${LETSENCRYPT_EMAIL}"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_certs:/letsencrypt
    restart: unless-stopped

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    depends_on:
      - database
      - redis
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.autocheck.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.autocheck.entrypoints=websecure"
      - "traefik.http.routers.autocheck.tls=true"
      - "traefik.http.routers.autocheck.tls.certresolver=le"
      - "traefik.http.services.autocheck.loadbalancer.server.port=8000"
    restart: unless-stopped

  worker:
    build: .
    command: celery -A app.worker.celery_app.celery_app worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - database
      - redis
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: autocheck
      POSTGRES_USER: autocheck
      POSTGRES_PASSWORD: autocheck
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  db_data:
  redis_data:
  traefik_certs:
