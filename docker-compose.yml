services:
  ollama:
    image: ollama/ollama:latest
    container_name: autocheck-ollama
    profiles: ["ai-local"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  android-checker-image:
    build:
      context: ./docker/checkers/android
    image: autocheck-android-checker:latest
    profiles: ["checker-images"]
    command: ["bash", "-lc", "echo checker image built"]

  api:
    build: .
    container_name: autocheck-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - database
      - redis
    volumes:
      - ./:/app

  worker:
    build: .
    container_name: autocheck-worker
    command: celery -A app.worker.celery_app.celery_app worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - database
      - redis
    volumes:
      - ./:/app
      - /var/run/docker.sock:/var/run/docker.sock

  database:
    image: postgres:16-alpine
    container_name: autocheck-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: autocheck
      POSTGRES_USER: autocheck
      POSTGRES_PASSWORD: autocheck
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: autocheck-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  db_data:
  redis_data:
  ollama_data:
